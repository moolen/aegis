name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Go modules
        run: go mod download

      - name: Check formatting
        run: |
          files=$(find . -name '*.go' \
            -not -path './.worktrees/*' \
            -not -path './vendor/*' \
            -not -path './.cache/*' \
            -not -path './.gocache/*' \
            -not -path './.gomodcache/*')
          test -z "$(gofmt -l $files)"

      - name: Run tests
        run: go test ./...

      - name: Run e2e smoke tests
        run: go test -tags e2e ./e2e/...

      - name: Build binary
        run: go build ./cmd/aegis

      - name: Build container
        run: docker build -t aegis:ci .

  kind-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Go modules
        run: go mod download

      - name: Install kubectl
        run: |
          curl -fsSL -o kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Kind
        run: |
          curl -fsSL -o kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Show tool versions
        run: |
          docker version
          kind version
          kubectl version --client
          helm version

      - name: Run Kind e2e matrix
        run: make e2e-kind
