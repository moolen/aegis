proxy:
  listen: ":3128"
metrics:
  listen: ":9090"
dns:
  cache_ttl: 30s
  timeout: 5s
  servers: []
discovery:
  kubernetes: []
  # kubernetes:
  #   - name: cluster-a
  #     kubeconfig: /path/to/kubeconfig
  #     namespaces: ["default"]
  #     resyncPeriod: 30s
policies:
  - name: allow-example
    identitySelector:
      matchLabels: {}
    egress:
      - fqdn: "example.com"
        ports: [80]
        tls:
          mode: mitm
        http:
          allowedMethods: ["GET"]
          allowedPaths: ["/*"]
