proxy:
  listen: ":3128"
  # Uncomment to enable TLS MITM for CONNECT rules with tls.mode: mitm.
  # ca:
  #   certFile: /etc/aegis/ca/ca.crt
  #   keyFile: /etc/aegis/ca/ca.key
metrics:
  listen: ":9090"
dns:
  cache_ttl: 30s
  timeout: 5s
  servers: []
discovery:
  kubernetes: []
  # kubernetes:
  #   - name: cluster-a
  #     kubeconfig: /path/to/kubeconfig
  #     namespaces: ["default"]
  #     resyncPeriod: 30s
  ec2: []
  # ec2:
  #   - name: production-ec2
  #     region: eu-central-1
  #     tagFilters:
  #       - key: "aegis-managed"
  #         values: ["true"]
  #     pollInterval: 30s
policies:
  - name: allow-example
    identitySelector:
      matchLabels: {}
    egress:
      - fqdn: "example.com"
        ports: [80]
        tls:
          mode: mitm
        http:
          allowedMethods: ["GET"]
          allowedPaths: ["/*"]
