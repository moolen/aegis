image:
  repository: ghcr.io/moolen/aegis
  tag: bootstrap
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  proxyPort: 3128
  metricsPort: 9090

serviceAccount:
  create: false
  name: ""

rbac:
  create: false

proxyCA:
  existingSecret: ""
  mountPath: /etc/aegis/ca
  certFile: ca.crt
  keyFile: ca.key

resources: {}

config:
  proxy:
    listen: ":3128"
    # proxyProtocol:
    #   enabled: true
    #   headerTimeout: 2s
    # ca:
    #   certFile: /etc/aegis/ca/ca.crt
    #   keyFile: /etc/aegis/ca/ca.key
  metrics:
    listen: ":9090"
  shutdown:
    gracePeriod: 10s
  dns:
    cache_ttl: 30s
    timeout: 5s
    servers: []
    rebindingProtection:
      allowedHostPatterns: []
      allowedCIDRs: []
  policies:
    - name: allow-example
      identitySelector:
        matchLabels: {}
      egress:
        - fqdn: "example.com"
          ports: [80]
          tls:
            mode: mitm
          http:
            allowedMethods: ["GET"]
            allowedPaths: ["/*"]

# Bootstrap status: this chart now renders a runnable default policy config.
# Plain HTTP requests are policy-enforced, Kubernetes and EC2 discovery can be
# wired at runtime, and CONNECT supports both SNI-validated passthrough and
# CA-backed TLS MITM when config.proxy.ca is set and a CA secret is mounted.
# The default empty identitySelector.matchLabels is a safe starter policy that
# matches any discovered identity; tighten it once you know the workload labels
# you want to authorize.
