image:
  repository: ghcr.io/moolen/aegis
  tag: bootstrap
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  proxyPort: 3128
  metricsPort: 9090

resources: {}

config:
  proxy:
    listen: ":3128"
  metrics:
    listen: ":9090"
  dns:
    cache_ttl: 30s
    timeout: 5s
    servers: []
  policies:
    - name: allow-example
      identitySelector:
        matchLabels: {}
      egress:
        - fqdn: "example.com"
          ports: [80]
          tls:
            mode: mitm
          http:
            allowedMethods: ["GET"]
            allowedPaths: ["/*"]

# Bootstrap status: this chart now renders a runnable default policy config.
# Plain HTTP requests are policy-enforced, CONNECT remains a basic tunnel, and
# real workload identity discovery/TLS inspection are not wired yet.
# Until identity discovery lands, shipped defaults should keep
# identitySelector.matchLabels empty.
