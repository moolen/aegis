image:
  repository: ghcr.io/moolen/aegis
  tag: bootstrap
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  proxyPort: 3128
  metricsPort: 9090
  proxyNodePort: null
  metricsNodePort: null

serviceAccount:
  create: false
  name: ""

rbac:
  create: false

proxyCA:
  existingSecret: ""
  mountPath: /etc/aegis/ca
  certFile: ca.crt
  keyFile: ca.key

resources: {}

config:
