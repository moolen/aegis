image:
  repository: ghcr.io/moolen/aegis
  tag: bootstrap
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  proxyPort: 3128
  metricsPort: 9090

resources: {}

config:
  proxy:
    listen: ":3128"
  metrics:
    listen: ":9090"
  dns:
    cache_ttl: 30s
    timeout: 5s
    servers: []
  policies:
    - name: allow-example
      identitySelector:
        matchLabels: {}
      egress:
        - fqdn: "example.com"
          ports: [80]
          tls:
            mode: mitm
          http:
            allowedMethods: ["GET"]
            allowedPaths: ["/*"]

# Bootstrap status: this chart now renders a runnable default policy config.
# Plain HTTP requests are policy-enforced, Kubernetes and EC2 discovery can be
# wired at runtime, and CONNECT remains a basic tunnel without TLS inspection
# yet.
# The default empty identitySelector.matchLabels is a safe starter policy that
# matches any discovered identity; tighten it once you know the workload labels
# you want to authorize.
