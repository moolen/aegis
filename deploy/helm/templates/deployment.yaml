apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis
{{- $serviceAccountName := .Values.serviceAccount.name | default "aegis" }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.config | sha256sum }}
      labels:
        app.kubernetes.io/name: aegis
    spec:
{{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ $serviceAccountName }}
{{- end }}
      containers:
        - name: aegis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-config"
            - "/etc/aegis/aegis.yaml"
          ports:
            - name: proxy
              containerPort: {{ .Values.service.proxyPort }}
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/aegis
              readOnly: true
{{- if .Values.proxyCA.existingSecret }}
            - name: proxy-ca
              mountPath: {{ .Values.proxyCA.mountPath }}
              readOnly: true
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: aegis-config
{{- if .Values.proxyCA.existingSecret }}
        - name: proxy-ca
          secret:
            secretName: {{ .Values.proxyCA.existingSecret }}
{{- end }}
