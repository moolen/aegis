apiVersion: v1
kind: Service
metadata:
  name: aegis
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: aegis
  ports:
    - name: proxy
      port: {{ .Values.service.proxyPort }}
      targetPort: proxy
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
