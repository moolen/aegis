proxyCA:
  existingSecret: aegis-perf-mitm-ca

config:
  proxy:
    listen: ":3128"
    enforcement: enforce
    unknownIdentityPolicy: deny
    ca:
      certFile: /etc/aegis/ca/ca.crt
      keyFile: /etc/aegis/ca/ca.key
  metrics:
    listen: ":9090"
  dns:
    cache_ttl: 30s
    timeout: 5s
    servers: []
    rebindingProtection:
      allowedHostPatterns: []
      allowedCIDRs: []
  discovery:
    kubernetes: []
    ec2: []
  policies:
    - name: perf-kind-connect-mitm
      subjects:
        cidrs:
          - "127.0.0.0/8"
      egress:
        - fqdn: "example.com"
          ports: [443]
          tls:
            mode: mitm
          http:
            allowedMethods: ["GET"]
            allowedPaths: ["/"]
