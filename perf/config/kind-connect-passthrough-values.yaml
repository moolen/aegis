config:
  proxy:
    listen: ":3128"
    enforcement: enforce
    unknownIdentityPolicy: deny
  metrics:
    listen: ":9090"
  dns:
    cache_ttl: 30s
    timeout: 5s
    servers: []
    rebindingProtection:
      allowedHostPatterns:
        - "*.svc.cluster.local"
      allowedCIDRs: []
  discovery:
    kubernetes: []
    ec2: []
  policies:
    - name: perf-kind-connect-passthrough
      subjects:
        cidrs:
          - "0.0.0.0/0"
          - "::/0"
      egress:
        - fqdn: "echo-tls.aegis-perf.svc.cluster.local"
          ports: [443]
          tls:
            mode: passthrough
